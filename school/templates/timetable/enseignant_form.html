{% extends 'Home/base.html' %}

{% block title %}Ajouter Enseignant{% endblock %}

{% block body %}
   
         <div class="page-wrapper">
            <div class="content container-fluid">
               <div class="page-header">
                  <div class="row align-items-center">
                     <div class="col">
                        <h3 class="page-title">Ajouter Enseignant</h3>
                        <ul class="breadcrumb">
                           <li><a href="{% url 'timetable:emploi_du_temps' %}">Time Table</a></li>
                           <li><a href="{% url 'timetable:enseignant_list' %}">Enseignants</a></li>
                           <li class="active">Ajouter Enseignant</li>
                        </ul>
                     </div>
                  </div>
               </div>
               
               {% if messages %}
                   {% for message in messages %}
                       <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                           {{ message }}
                           <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                               <span aria-hidden="true">&times;</span>
                           </button>
                       </div>
                   {% endfor %}
               {% endif %}

               <div class="row">
                  <div class="col-sm-12">
                     <div class="card">
                        <div class="card-body">
                           <form method="post">
                               {% csrf_token %}
                               <div class="row">
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Nom</label>
                                           <input type="text" name="nom" class="form-control" required>
                                       </div>
                                   </div>
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Prénom</label>
                                           <input type="text" name="prenom" class="form-control" required>
                                       </div>
                                   </div>
                               </div>
                               <div class="row">
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Email</label>
                                           <input type="email" name="email" class="form-control">
                                       </div>
                                   </div>
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Téléphone</label>
                                           <input type="text" name="telephone" class="form-control">
                                       </div>
                                   </div>
                               </div>
                               <div class="row">
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Spécialité</label>
                                           <input type="text" name="specialite" class="form-control">
                                       </div>
                                   </div>
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Grade</label>
                                           <select name="grade" class="form-control">
                                               <option value="">Choisir...</option>
                                               <option value="prof">Professeur</option>
                                               <option value="ma">Maître Assistant</option>
                                               <option value="mc">Maître Conférence</option>
                                               <option value="vac">Vacataire</option>
                                           </select>
                                       </div>
                                   </div>
                               </div>
                               <div class="row">
                                   <div class="col-md-12">
                                       <div class="form-group">
                                           <label>Modules enseignés</label>
                                           <textarea name="modules" class="form-control" rows="3"></textarea>
                                       </div>
                                   </div>
                               </div>
                               <div class="m-t-20 text-center">
                                   <button type="submit" class="btn btn-primary">
                                       <i class="fas fa-save"></i> Enregistrer
                                   </button>
                                   <a href="{% url 'timetable:enseignant_list' %}" class="btn btn-secondary">
                                       <i class="fas fa-arrow-left"></i> Annuler
                                   </a>
                               </div>
                           </form>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
{% endblock %}
