{% extends 'Home/base.html' %}

{% block title %}Edit Department{% endblock %}

{% block body %}
   
         <div class="page-wrapper">
            <div class="content container-fluid">
               <div class="page-header">
                  <div class="row align-items-center">
                     <div class="col">
                        <h3 class="page-title">Edit Department</h3>
                        <ul class="breadcrumb">
                           <li><a href="{% url 'departements:departement_list' %}">Departments</a></li>
                           <li class="active">Edit Department</li>
                        </ul>
                     </div>
                  </div>
               </div>
               
               {% if messages %}
                   {% for message in messages %}
                       <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                           {{ message }}
                           <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                               <span aria-hidden="true">&times;</span>
                           </button>
                       </div>
                   {% endfor %}
               {% endif %}

               <div class="row">
                  <div class="col-sm-12">
                     <div class="card">
                        <div class="card-body">
                           <form method="post">
                               {% csrf_token %}
                               <div class="row">
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Name</label>
                                           <input type="text" name="name" class="form-control" value="{{ departement.nom }}" required>
                                       </div>
                                   </div>
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Code</label>
                                           <input type="text" name="code" class="form-control" value="{{ departement.code }}" required>
                                       </div>
                                   </div>
                               </div>
                               <div class="row">
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Responsable</label>
                                           <input type="text" name="responsable" class="form-control" value="{{ departement.responsable }}">
                                       </div>
                                   </div>
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Email</label>
                                           <input type="email" name="email" class="form-control" value="{{ departement.email }}">
                                       </div>
                                   </div>
                               </div>
                               <div class="row">
                                   <div class="col-md-6">
                                       <div class="form-group">
                                           <label>Telephone</label>
                                           <input type="text" name="telephone" class="form-control" value="{{ departement.telephone }}">
                                       </div>
                                   </div>
                               </div>
                               <div class="row">
                                   <div class="col-md-12">
                                       <div class="form-group">
                                           <label>Description</label>
                                           <textarea name="description" class="form-control" rows="3">{{ departement.description }}</textarea>
                                       </div>
                                   </div>
                               </div>
                               <div class="m-t-20 text-center">
                                   <button type="submit" class="btn btn-primary">
                                       <i class="fas fa-save"></i> Update Department
                                   </button>
                                   <a href="{% url 'departements:departement_list' %}" class="btn btn-secondary">
                                       <i class="fas fa-arrow-left"></i> Back to Departments
                                   </a>
                               </div>
                           </form>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
            </div>
         </div>
{% endblock %}
